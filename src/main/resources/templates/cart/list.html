<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장바구니 | FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<section class="container my-4">
    <h5 class="fw-bold mb-4" style="letter-spacing: 2px;">장바구니</h5>

    <!-- 알림 메시지 -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert" style="font-size: 13px;">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
    </div>

    <!-- 장바구니 비어있음 -->
    <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-5">
        <i class="bi bi-bag" style="font-size: 48px; color: #ccc;"></i>
        <p class="mt-3 text-muted">장바구니가 비어있습니다.</p>
        <a href="/" class="btn btn-dark btn-sm mt-2" style="font-size: 13px; padding: 8px 30px;">쇼핑하러 가기</a>
    </div>

    <!-- 장바구니 목록 -->
    <div th:if="${!#lists.isEmpty(cartItems)}">
        <div class="list-group mb-4">
            <div class="list-group-item py-3" th:each="item : ${cartItems}">
                <div class="row align-items-center">
                    <!-- 상품 이미지 -->
                    <div class="col-3 col-md-2">
                        <a th:href="@{/product/{id}(id=${item.product.id})}">
                            <div style="aspect-ratio: 3/4; background-color: #f0f0f0; border-radius: 6px; overflow: hidden;">
                                <img th:if="${item.product.imageUrl != null}" th:src="${item.product.imageUrl}"
                                     style="width: 100%; height: 100%; object-fit: cover;">
                                <div th:if="${item.product.imageUrl == null}"
                                     class="d-flex align-items-center justify-content-center h-100">
                                    <span style="font-size: 10px; color: #bbb;">NO IMAGE</span>
                                </div>
                            </div>
                        </a>
                    </div>
                    <!-- 상품 정보 -->
                    <div class="col-5 col-md-5">
                        <a th:href="@{/product/{id}(id=${item.product.id})}" class="text-decoration-none text-dark">
                            <p class="mb-1 fw-bold" style="font-size: 14px;" th:text="${item.product.name}">상품명</p>
                        </a>
                        <p class="mb-0" style="font-size: 13px; color: #666;"
                           th:text="${#numbers.formatInteger(item.product.price, 0, 'COMMA')} + '원'">0원</p>
                    </div>
                    <!-- 수량 -->
                    <div class="col-2 col-md-3">
                        <form th:action="@{/cart/{id}/update(id=${item.id})}" method="post" class="d-flex align-items-center gap-1">
                            <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="number" name="quantity" th:value="${item.quantity}" min="1"
                                   class="form-control form-control-sm text-center cart-qty-input" style="width: 60px; font-size: 12px;"
                                   onchange="this.form.submit()">
                        </form>
                        <p class="mb-0 mt-1 fw-bold" style="font-size: 13px;"
                           th:text="${#numbers.formatInteger(item.totalPrice, 0, 'COMMA')} + '원'">0원</p>
                    </div>
                    <!-- 삭제 -->
                    <div class="col-2 col-md-2 text-end">
                        <form th:action="@{/cart/{id}/remove(id=${item.id})}" method="post">
                            <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-outline-secondary" style="font-size: 11px;">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- 합계 -->
        <div class="border-top pt-3 text-end">
            <p class="mb-1" style="font-size: 13px; color: #666;">총 상품금액</p>
            <p class="fw-bold" style="font-size: 22px;"
               th:text="${#numbers.formatInteger(totalPrice, 0, 'COMMA')} + '원'">0원</p>
            <a href="/order/checkout" class="btn btn-dark mt-2" style="font-size: 14px; padding: 10px 40px;">
                주문하기
            </a>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
