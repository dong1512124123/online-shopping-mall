<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 완료 - FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5 text-center" style="max-width: 600px;">
    <i class="bi bi-check-circle" style="font-size: 48px; color: #28a745;"></i>
    <h5 class="fw-bold mt-3 mb-2">주문이 완료되었습니다</h5>
    <p class="text-muted" style="font-size: 13px;">
        주문번호: <strong th:text="${order.orderNumber}">ORD000</strong>
    </p>

    <div class="card border-0 shadow-sm mt-4 text-start">
        <div class="card-body" style="font-size: 13px;">
            <div class="d-flex justify-content-between py-2 border-bottom">
                <span class="text-muted">결제수단</span>
                <span th:text="${order.paymentMethod.displayName}">카드</span>
            </div>
            <div class="d-flex justify-content-between py-2 border-bottom">
                <span class="text-muted">배송지</span>
                <span th:text="${order.address + ' ' + (order.addressDetail ?: '')}">주소</span>
            </div>
            <div class="d-flex justify-content-between py-2">
                <span class="text-muted">결제금액</span>
                <span class="fw-bold" style="color: #e74c3c;"
                      th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA')} + '원'">0원</span>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a href="/order/list" class="btn btn-dark px-4 me-2">주문내역</a>
        <a href="/" class="btn btn-outline-dark px-4">쇼핑 계속하기</a>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
