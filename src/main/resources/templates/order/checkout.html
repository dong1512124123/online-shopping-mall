<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문하기 - FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5" style="max-width: 800px;">
    <h5 class="fw-bold mb-4">주문하기</h5>

    <div th:if="${error}" class="alert alert-danger" style="font-size: 13px;" th:text="${error}"></div>

    <form action="/order/place" method="post">

        <!-- 주문 상품 -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <h6 class="fw-bold mb-3" style="font-size: 14px;">주문 상품</h6>
                <div th:each="item : ${cartItems}" class="d-flex align-items-center py-2 border-bottom">
                    <div class="flex-grow-1">
                        <p class="mb-0" style="font-size: 13px;" th:text="${item.product.name}">상품명</p>
                        <small class="text-muted" th:text="'수량: ' + ${item.quantity} + '개'">수량</small>
                    </div>
                    <span class="fw-bold" style="font-size: 13px;"
                          th:text="${#numbers.formatInteger(item.totalPrice, 0, 'COMMA')} + '원'">0원</span>
                </div>
                <div class="d-flex justify-content-between mt-3">
                    <span class="fw-bold" style="font-size: 14px;">총 결제금액</span>
                    <span class="fw-bold" style="font-size: 16px; color: #e74c3c;"
                          th:text="${#numbers.formatInteger(totalPrice, 0, 'COMMA')} + '원'">0원</span>
                </div>
            </div>
        </div>

        <!-- 배송 정보 -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <h6 class="fw-bold mb-3" style="font-size: 14px;">배송 정보</h6>
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">받는 분 *</label>
                    <input type="text" name="recipientName" class="form-control form-control-sm" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">연락처 *</label>
                    <input type="text" name="recipientPhone" class="form-control form-control-sm"
                           placeholder="010-0000-0000" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">우편번호 *</label>
                    <input type="text" name="zipcode" class="form-control form-control-sm" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">주소 *</label>
                    <input type="text" name="address" class="form-control form-control-sm" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">상세주소</label>
                    <input type="text" name="addressDetail" class="form-control form-control-sm">
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">배송 메모</label>
                    <input type="text" name="memo" class="form-control form-control-sm"
                           placeholder="부재시 문 앞에 놓아주세요">
                </div>
            </div>
        </div>

        <!-- 결제 수단 -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <h6 class="fw-bold mb-3" style="font-size: 14px;">결제 수단</h6>
                <div th:each="method : ${paymentMethods}" class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="paymentMethod"
                           th:value="${method}" th:id="${method}"
                           th:checked="${method.name() == 'CARD'}">
                    <label class="form-check-label" style="font-size: 13px;"
                           th:for="${method}" th:text="${method.displayName}">결제수단</label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-dark w-100 py-2"
                th:text="${#numbers.formatInteger(totalPrice, 0, 'COMMA')} + '원 결제하기'">결제하기</button>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
