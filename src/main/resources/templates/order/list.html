<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문내역 - FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5" style="max-width: 800px;">
    <h5 class="fw-bold mb-4">주문내역</h5>

    <div th:if="${message}" class="alert alert-success" style="font-size: 13px;" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" style="font-size: 13px;" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
        <i class="bi bi-receipt" style="font-size: 40px; color: #ddd;"></i>
        <p class="text-muted mt-3" style="font-size: 13px;">주문내역이 없습니다.</p>
        <a href="/" class="btn btn-dark btn-sm mt-2">쇼핑하러 가기</a>
    </div>

    <div th:each="order : ${orders}" class="card border-0 shadow-sm mb-3">
        <div class="card-body" style="font-size: 13px;">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div class="order-header-info d-flex flex-wrap">
                    <span class="text-muted" th:text="${#temporals.format(order.createdAt, 'yyyy.MM.dd HH:mm')}">날짜</span>
                    <span class="ms-2" style="font-size: 12px; color: #888;"
                          th:text="${order.orderNumber}">주문번호</span>
                </div>
                <span class="badge rounded-pill"
                      th:classappend="${order.status.name() == 'CANCELLED' ? 'bg-secondary' :
                                       (order.status.name() == 'DELIVERED' ? 'bg-success' : 'bg-dark')}"
                      th:text="${order.status.displayName}">상태</span>
            </div>

            <div th:each="item : ${order.orderItems}" class="d-flex justify-content-between py-1">
                <span th:text="${item.productName + ' x ' + item.quantity}">상품명</span>
                <span th:text="${#numbers.formatInteger(item.totalPrice, 0, 'COMMA')} + '원'">0원</span>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-2 pt-2 border-top">
                <span class="fw-bold"
                      th:text="'합계 ' + ${#numbers.formatInteger(order.totalPrice, 0, 'COMMA')} + '원'">합계</span>
                <div>
                    <a th:href="@{/order/{id}(id=${order.id})}" class="btn btn-outline-dark btn-sm">상세보기</a>
                    <form th:if="${order.status.name() == 'PAID' or order.status.name() == 'PENDING'}"
                          th:action="@{/order/{id}/cancel(id=${order.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-secondary btn-sm"
                                onclick="return confirm('주문을 취소하시겠습니까?')">취소</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
