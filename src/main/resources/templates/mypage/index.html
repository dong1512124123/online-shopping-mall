<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <h5 class="fw-bold mb-4">마이페이지</h5>

            <!-- 메시지 -->
            <div th:if="${success}" class="alert alert-success py-2" style="font-size: 13px;" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger py-2" style="font-size: 13px;" th:text="${error}"></div>

            <!-- 프로필 수정 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <h6 class="fw-bold mb-3">프로필 정보</h6>
                    <form th:action="@{/mypage/update}" method="post">
                        <div class="mb-3">
                            <label class="form-label" style="font-size: 13px;">아이디</label>
                            <input type="text" class="form-control form-control-sm" th:value="${member.username}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size: 13px;">이메일</label>
                            <input type="email" class="form-control form-control-sm" th:value="${member.email}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size: 13px;">닉네임</label>
                            <input type="text" name="nickname" class="form-control form-control-sm" th:value="${member.nickname}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size: 13px;">전화번호</label>
                            <input type="text" name="phone" class="form-control form-control-sm" th:value="${member.phone}" placeholder="010-0000-0000">
                        </div>
                        <button type="submit" class="btn btn-dark btn-sm w-100">프로필 수정</button>
                    </form>
                </div>
            </div>

            <!-- 비밀번호 변경 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <h6 class="fw-bold mb-3">비밀번호 변경</h6>
                    <form th:action="@{/mypage/password}" method="post">
                        <div class="mb-3">
                            <label class="form-label" style="font-size: 13px;">현재 비밀번호</label>
                            <input type="password" name="currentPassword" class="form-control form-control-sm" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size: 13px;">새 비밀번호</label>
                            <input type="password" name="newPassword" class="form-control form-control-sm" required minlength="4">
                        </div>
                        <button type="submit" class="btn btn-outline-dark btn-sm w-100">비밀번호 변경</button>
                    </form>
                </div>
            </div>

            <!-- 바로가기 -->
            <div class="d-flex gap-2">
                <a href="/wishlist" class="btn btn-outline-secondary btn-sm flex-fill">
                    <i class="bi bi-heart"></i> 좋아요 목록
                </a>
                <a href="/cart" class="btn btn-outline-secondary btn-sm flex-fill">
                    <i class="bi bi-bag"></i> 장바구니
                </a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
