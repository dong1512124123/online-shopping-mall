<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <h4 class="fw-bold">로그인</h4>
                <p class="text-muted" style="font-size: 13px;">FASHION STORE에 오신 것을 환영합니다</p>
            </div>

            <!-- 메시지 -->
            <div th:if="${errorMessage}" class="alert alert-danger py-2" style="font-size: 13px;" th:text="${errorMessage}"></div>
            <div th:if="${logoutMessage}" class="alert alert-info py-2" style="font-size: 13px;" th:text="${logoutMessage}"></div>
            <div th:if="${successMessage}" class="alert alert-success py-2" style="font-size: 13px;" th:text="${successMessage}"></div>

            <form th:action="@{/auth/login}" method="post">
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">아이디</label>
                    <input type="text" name="username" class="form-control form-control-sm" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">비밀번호</label>
                    <input type="password" name="password" class="form-control form-control-sm" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 btn-sm py-2 mt-2">로그인</button>
            </form>

            <div class="text-center mt-3">
                <a href="/auth/register" class="text-muted text-decoration-none" style="font-size: 13px;">
                    아직 회원이 아니신가요? <span class="text-dark fw-semibold">회원가입</span>
                </a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
