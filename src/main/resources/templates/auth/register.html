<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <h4 class="fw-bold">회원가입</h4>
                <p class="text-muted" style="font-size: 13px;">FASHION STORE 회원이 되어보세요</p>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger py-2" style="font-size: 13px;" th:text="${errorMessage}"></div>

            <form th:action="@{/auth/register}" method="post">
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">아이디 <span class="text-danger">*</span></label>
                    <input type="text" name="username" class="form-control form-control-sm"
                           placeholder="4자 이상 영문, 숫자" required minlength="4">
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">비밀번호 <span class="text-danger">*</span></label>
                    <input type="password" name="password" class="form-control form-control-sm"
                           placeholder="8자 이상" required minlength="8">
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">비밀번호 확인 <span class="text-danger">*</span></label>
                    <input type="password" name="passwordConfirm" class="form-control form-control-sm"
                           placeholder="비밀번호를 다시 입력하세요" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">닉네임 <span class="text-danger">*</span></label>
                    <input type="text" name="nickname" class="form-control form-control-sm"
                           placeholder="닉네임을 입력하세요" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">이메일 <span class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control form-control-sm"
                           placeholder="example@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">전화번호</label>
                    <input type="tel" name="phone" class="form-control form-control-sm"
                           placeholder="010-0000-0000">
                </div>
                <button type="submit" class="btn btn-dark w-100 btn-sm py-2 mt-2">가입하기</button>
            </form>

            <div class="text-center mt-3">
                <a href="/auth/login" class="text-muted text-decoration-none" style="font-size: 13px;">
                    이미 회원이신가요? <span class="text-dark fw-semibold">로그인</span>
                </a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
