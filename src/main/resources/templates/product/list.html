<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${categoryName} + ' | FASHION STORE'">카테고리 | FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<!-- 카테고리 헤더 -->
<section class="container my-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb" style="font-size: 12px;">
            <li class="breadcrumb-item"><a href="/" class="text-dark">HOME</a></li>
            <li class="breadcrumb-item active" th:text="${category}">CATEGORY</li>
        </ol>
    </nav>
    <h4 class="fw-bold mb-1" th:text="${category}" style="letter-spacing: 3px;">CATEGORY</h4>
    <p class="text-muted" style="font-size: 13px;" th:text="${categoryName} + ' 컬렉션'">컬렉션</p>
</section>

<!-- 상품 목록 -->
<section class="container mb-5">
    <!-- 상품 없음 -->
    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
        <i class="bi bi-inbox" style="font-size: 48px; color: #ccc;"></i>
        <p class="mt-3 text-muted">등록된 상품이 없습니다.</p>
    </div>

    <!-- 상품 있음 -->
    <div class="row g-3">
        <div class="col-6 col-md-3" th:each="product : ${products}">
            <a th:href="@{/product/{id}(id=${product.id})}" class="text-decoration-none">
                <div class="product-card position-relative">
                    <div class="product-img-placeholder" style="background-color: #f0f0f0;">
                        <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" th:alt="${product.name}">
                        <span th:if="${product.imageUrl == null}">NO IMAGE</span>
                        <!-- 뱃지 -->
                        <span th:if="${product.sale}" class="product-badge badge-sale">SALE</span>
                        <span th:if="${product.new && !product.sale}" class="product-badge badge-new">NEW</span>
                    </div>
                    <div class="product-info">
                        <p class="product-name" th:text="${product.name}">상품명</p>
                        <div class="d-flex align-items-center gap-1">
                            <span th:if="${product.sale}" class="product-discount"
                                  th:text="${product.discountPercent} + '%'">20%</span>
                            <span class="product-price"
                                  th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'">0원</span>
                        </div>
                        <span th:if="${product.originalPrice != null && product.sale}" class="product-original-price"
                              th:text="${#numbers.formatInteger(product.originalPrice, 0, 'COMMA')} + '원'">0원</span>
                        <div class="mt-1" style="font-size: 11px; color: #999;">
                            <i class="bi bi-heart"></i>
                            <span th:text="${product.wishCount}">0</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
