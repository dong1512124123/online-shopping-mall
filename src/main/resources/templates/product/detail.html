<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' | FASHION STORE'">상품 | FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<section class="container my-4">
    <!-- 브레드크럼 -->
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb" style="font-size: 12px;">
            <li class="breadcrumb-item"><a href="/" class="text-dark">HOME</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/category/{cat}(cat=${product.category})}" class="text-dark"
                   th:text="${product.category}">CATEGORY</a>
            </li>
            <li class="breadcrumb-item active" th:text="${product.name}">상품명</li>
        </ol>
    </nav>

    <!-- 알림 메시지 -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert" style="font-size: 13px;">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <!-- 상품 이미지 -->
        <div class="col-md-6">
            <div class="product-img-placeholder" style="background-color: #f5f5f5; aspect-ratio: 3/4; border-radius: 8px;">
                <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" th:alt="${product.name}"
                     style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">
                <span th:if="${product.imageUrl == null}" style="font-size: 16px; color: #bbb;">NO IMAGE</span>
            </div>
        </div>

        <!-- 상품 정보 -->
        <div class="col-md-6">
            <span class="badge bg-dark mb-2" th:text="${product.category.displayName}">카테고리</span>
            <span th:if="${product.sale}" class="badge bg-danger mb-2">SALE</span>
            <span th:if="${product.new}" class="badge bg-secondary mb-2">NEW</span>

            <h4 class="fw-bold mt-1" th:text="${product.name}">상품명</h4>

            <!-- 가격 -->
            <div class="mt-3">
                <div th:if="${product.sale && product.originalPrice != null}" class="mb-1">
                    <span class="product-original-price" style="font-size: 16px;"
                          th:text="${#numbers.formatInteger(product.originalPrice, 0, 'COMMA')} + '원'">0원</span>
                    <span class="product-discount" style="font-size: 18px;"
                          th:text="${product.discountPercent} + '%'">0%</span>
                </div>
                <p class="fw-bold mb-0 product-detail-price" style="font-size: 24px;"
                   th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'">0원</p>
            </div>

            <!-- 상품 설명 -->
            <p class="mt-3 text-muted" style="font-size: 13px; line-height: 1.8;"
               th:text="${product.description}">상품 설명</p>

            <!-- 재고 -->
            <p class="mt-2" style="font-size: 12px; color: #999;">
                재고: <span th:text="${product.stock > 0 ? product.stock + '개' : '품절'}">0개</span>
                &nbsp;|&nbsp;
                <i class="bi bi-heart"></i> <span th:text="${product.wishCount}">0</span>
                &nbsp;|&nbsp;
                조회 <span th:text="${product.viewCount}">0</span>
            </p>

            <hr>

            <!-- 관리자용 버튼 -->
            <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-2 mt-3">
                <a th:href="@{/admin/product/{id}/edit(id=${product.id})}"
                   class="btn btn-dark btn-sm px-4" style="padding: 8px 20px; font-size: 13px;">
                    <i class="bi bi-pencil"></i> 상품 수정
                </a>
                <a th:href="@{/admin/product/{id}(id=${product.id})}"
                   class="btn btn-outline-dark btn-sm px-4" style="padding: 8px 20px; font-size: 13px;">
                    <i class="bi bi-gear"></i> 관리자 상세
                </a>
            </div>

            <!-- 일반 사용자용: 수량 선택 + 장바구니/좋아요 버튼 -->
            <div sec:authorize="!hasRole('ADMIN')" class="d-flex align-items-center gap-2 mt-3 product-detail-actions">
                <form th:action="@{/cart/add}" method="post" class="d-flex align-items-center gap-2 flex-grow-1"
                      id="cartForm">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="input-group" style="width: 120px;">
                        <button type="button" class="btn btn-outline-dark btn-sm" onclick="changeQty(-1)">-</button>
                        <input type="number" name="quantity" id="quantity" value="1" min="1"
                               th:max="${product.stock}"
                               class="form-control form-control-sm text-center" style="font-size: 13px;" readonly>
                        <button type="button" class="btn btn-outline-dark btn-sm" onclick="changeQty(1)">+</button>
                    </div>
                    <button type="submit" class="btn btn-dark btn-sm flex-grow-1"
                            th:disabled="${product.stock <= 0}"
                            style="padding: 8px 20px; font-size: 13px;"
                            onclick="return checkLogin(event, 'cart')">
                        <i class="bi bi-bag"></i> 장바구니 담기
                    </button>
                </form>

                <!-- 좋아요 버튼 -->
                <button type="button" class="btn btn-sm"
                        th:classappend="${isWished ? 'btn-danger' : 'btn-outline-danger'}"
                        style="padding: 8px 14px; font-size: 13px;"
                        onclick="toggleWishlist()" id="wishBtn"
                        th:attr="data-product-id=${product.id}">
                    <i class="bi" th:classappend="${isWished ? 'bi-heart-fill' : 'bi-heart'}"></i>
                </button>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script th:inline="javascript">
    const isAuthenticated = [[${#authorization.expression('isAuthenticated()')}]];
    const csrfToken = [[${_csrf.token}]];
    const csrfHeader = [[${_csrf.headerName}]];

    function changeQty(delta) {
        const input = document.getElementById('quantity');
        let val = parseInt(input.value) + delta;
        if (val < 1) val = 1;
        const max = parseInt(input.max);
        if (val > max) val = max;
        input.value = val;
    }

    function checkLogin(event, type) {
        if (!isAuthenticated) {
            event.preventDefault();
            if (confirm('로그인이 필요합니다. 로그인 페이지로 이동하시겠습니까?')) {
                window.location.href = '/auth/login';
            }
            return false;
        }
        return true;
    }

    function toggleWishlist() {
        if (!isAuthenticated) {
            if (confirm('로그인이 필요합니다. 로그인 페이지로 이동하시겠습니까?')) {
                window.location.href = '/auth/login';
            }
            return;
        }

        const btn = document.getElementById('wishBtn');
        const productId = btn.getAttribute('data-product-id');

        fetch('/wishlist/toggle?productId=' + productId, {
            method: 'POST',
            headers: {
                [csrfHeader]: csrfToken
            }
        })
        .then(res => res.json())
        .then(data => {
            const icon = btn.querySelector('i');
            if (data.wished) {
                btn.classList.remove('btn-outline-danger');
                btn.classList.add('btn-danger');
                icon.classList.remove('bi-heart');
                icon.classList.add('bi-heart-fill');
            } else {
                btn.classList.remove('btn-danger');
                btn.classList.add('btn-outline-danger');
                icon.classList.remove('bi-heart-fill');
                icon.classList.add('bi-heart');
            }
        });
    }
</script>
</body>
</html>
