<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색 결과 | FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<section class="container my-4">
    <h5 class="fw-bold" style="letter-spacing: 1px;">
        '<span th:text="${keyword}">검색어</span>' 검색 결과
        <small class="text-muted" style="font-size: 13px;"
               th:text="'(' + ${#lists.size(products)} + '개)'"></small>
    </h5>

    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
        <i class="bi bi-search" style="font-size: 48px; color: #ccc;"></i>
        <p class="mt-3 text-muted">검색 결과가 없습니다.</p>
    </div>

    <div class="row g-3 mt-2">
        <div class="col-6 col-md-3" th:each="product : ${products}">
            <a th:href="@{/product/{id}(id=${product.id})}" class="text-decoration-none">
                <div class="product-card position-relative">
                    <div class="product-img-placeholder" style="background-color: #f0f0f0;">
                        <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" th:alt="${product.name}">
                        <span th:if="${product.imageUrl == null}">NO IMAGE</span>
                        <span th:if="${product.sale}" class="product-badge badge-sale">SALE</span>
                        <span th:if="${product.new && !product.sale}" class="product-badge badge-new">NEW</span>
                    </div>
                    <div class="product-info">
                        <p class="product-name" th:text="${product.name}">상품명</p>
                        <div class="d-flex align-items-center gap-1">
                            <span th:if="${product.sale}" class="product-discount"
                                  th:text="${product.discountPercent} + '%'">20%</span>
                            <span class="product-price"
                                  th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'">0원</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
