<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>좋아요 | FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<section class="container my-4">
    <h5 class="fw-bold mb-4" style="letter-spacing: 2px;">
        <i class="bi bi-heart-fill text-danger"></i> 좋아요
    </h5>

    <!-- 비어있음 -->
    <div th:if="${#lists.isEmpty(wishItems)}" class="text-center py-5">
        <i class="bi bi-heart" style="font-size: 48px; color: #ccc;"></i>
        <p class="mt-3 text-muted">좋아요한 상품이 없습니다.</p>
        <a href="/" class="btn btn-dark btn-sm mt-2" style="font-size: 13px; padding: 8px 30px;">쇼핑하러 가기</a>
    </div>

    <!-- 좋아요 목록 -->
    <div class="row g-3">
        <div class="col-6 col-md-3" th:each="wish : ${wishItems}">
            <a th:href="@{/product/{id}(id=${wish.product.id})}" class="text-decoration-none">
                <div class="product-card position-relative">
                    <div class="product-img-placeholder" style="background-color: #f0f0f0;">
                        <img th:if="${wish.product.imageUrl != null}" th:src="${wish.product.imageUrl}"
                             th:alt="${wish.product.name}">
                        <span th:if="${wish.product.imageUrl == null}">NO IMAGE</span>
                        <span th:if="${wish.product.sale}" class="product-badge badge-sale">SALE</span>
                    </div>
                    <div class="product-info">
                        <p class="product-name" th:text="${wish.product.name}">상품명</p>
                        <div class="d-flex align-items-center gap-1">
                            <span th:if="${wish.product.sale}" class="product-discount"
                                  th:text="${wish.product.discountPercent} + '%'">20%</span>
                            <span class="product-price"
                                  th:text="${#numbers.formatInteger(wish.product.price, 0, 'COMMA')} + '원'">0원</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
