<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 상세 - FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5" style="max-width: 600px;">
    <h5 class="fw-bold mb-4">회원 상세</h5>

    <div class="card border-0 shadow-sm">
        <div class="card-body" style="font-size: 13px;">
            <div class="row mb-2">
                <div class="col-4 text-muted">아이디</div>
                <div class="col-8" th:text="${member.username}">user</div>
            </div>
            <div class="row mb-2">
                <div class="col-4 text-muted">닉네임</div>
                <div class="col-8" th:text="${member.nickname}">닉네임</div>
            </div>
            <div class="row mb-2">
                <div class="col-4 text-muted">이메일</div>
                <div class="col-8" th:text="${member.email}">email</div>
            </div>
            <div class="row mb-2">
                <div class="col-4 text-muted">연락처</div>
                <div class="col-8" th:text="${member.phone ?: '-'}">010</div>
            </div>
            <div class="row mb-2">
                <div class="col-4 text-muted">가입일</div>
                <div class="col-8" th:text="${#temporals.format(member.createdAt, 'yyyy.MM.dd HH:mm')}">날짜</div>
            </div>
            <div class="row mb-2">
                <div class="col-4 text-muted">상태</div>
                <div class="col-8">
                    <span th:if="${member.enabled}" class="badge bg-success">활성</span>
                    <span th:unless="${member.enabled}" class="badge bg-secondary">정지</span>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3 d-flex gap-2">
        <a href="/admin/member" class="btn btn-outline-dark btn-sm">목록으로</a>
        <form th:action="@{/admin/member/{id}/toggle(id=${member.id})}" method="post">
            <button type="submit" class="btn btn-outline-secondary btn-sm"
                    th:text="${member.enabled ? '계정 정지' : '계정 활성화'}">정지</button>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
