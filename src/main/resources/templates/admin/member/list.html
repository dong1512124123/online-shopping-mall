<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원관리 - FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <h5 class="fw-bold mb-4">회원관리</h5>

    <div th:if="${message}" class="alert alert-success" style="font-size: 13px;" th:text="${message}"></div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0" style="font-size: 13px;">
                <thead class="table-light">
                    <tr>
                        <th style="width: 60px;">ID</th>
                        <th>아이디</th>
                        <th>닉네임</th>
                        <th>이메일</th>
                        <th style="width: 110px;">연락처</th>
                        <th style="width: 130px;">가입일</th>
                        <th style="width: 60px;">상태</th>
                        <th style="width: 100px;">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="member : ${members}">
                        <td th:text="${member.id}">1</td>
                        <td th:text="${member.username}">user</td>
                        <td th:text="${member.nickname}">닉네임</td>
                        <td th:text="${member.email}">email</td>
                        <td th:text="${member.phone ?: '-'}">010</td>
                        <td style="font-size: 12px;"
                            th:text="${#temporals.format(member.createdAt, 'yyyy.MM.dd HH:mm')}">날짜</td>
                        <td>
                            <span th:if="${member.enabled}" class="badge bg-success" style="font-size: 10px;">활성</span>
                            <span th:unless="${member.enabled}" class="badge bg-secondary" style="font-size: 10px;">정지</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/member/{id}/toggle(id=${member.id})}"
                                  method="post" class="d-inline">
                                <button type="submit" class="btn btn-outline-secondary btn-sm"
                                        style="font-size: 11px;"
                                        th:text="${member.enabled ? '정지' : '활성화'}">정지</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(members)}">
                        <td colspan="8" class="text-center text-muted py-4">가입한 회원이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a href="/admin/dashboard" class="btn btn-outline-dark btn-sm">대시보드로</a>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
