<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품관리 - FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0">상품관리</h5>
        <a href="/admin/product/new" class="btn btn-dark btn-sm">
            <i class="bi bi-plus"></i> 상품 등록
        </a>
    </div>

    <div th:if="${message}" class="alert alert-success" style="font-size: 13px;" th:text="${message}"></div>

    <!-- 검색 -->
    <form action="/admin/product" method="get" class="mb-3">
        <div class="input-group input-group-sm" style="max-width: 300px;">
            <input type="text" name="keyword" class="form-control" placeholder="상품명 검색"
                   th:value="${keyword}" style="font-size: 13px;">
            <button class="btn btn-outline-dark" type="submit" style="font-size: 13px;">검색</button>
        </div>
    </form>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0" style="font-size: 13px;">
                <thead class="table-light">
                    <tr>
                        <th style="width: 60px;">ID</th>
                        <th>상품명</th>
                        <th style="width: 80px;">카테고리</th>
                        <th style="width: 100px;">가격</th>
                        <th style="width: 60px;">재고</th>
                        <th style="width: 60px;">조회수</th>
                        <th style="width: 60px;">상태</th>
                        <th style="width: 150px;">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}">1</td>
                        <td>
                            <a th:href="@{/admin/product/{id}(id=${product.id})}"
                               class="text-dark text-decoration-none fw-medium"
                               th:text="${product.name}">상품명</a>
                            <span th:if="${product.sale}" class="badge bg-danger" style="font-size: 10px;">SALE</span>
                            <span th:if="${product.new}" class="badge bg-dark" style="font-size: 10px;">NEW</span>
                        </td>
                        <td th:text="${product.category.displayName}">카테고리</td>
                        <td th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'">0원</td>
                        <td>
                            <span th:class="${product.stock <= 5 ? 'text-danger fw-bold' : ''}"
                                  th:text="${product.stock}">0</span>
                        </td>
                        <td th:text="${product.viewCount}">0</td>
                        <td>
                            <span th:if="${product.enabled}" class="badge bg-success" style="font-size: 10px;">판매중</span>
                            <span th:unless="${product.enabled}" class="badge bg-secondary" style="font-size: 10px;">숨김</span>
                        </td>
                        <td>
                            <a th:href="@{/admin/product/{id}/edit(id=${product.id})}"
                               class="btn btn-outline-dark btn-sm" style="font-size: 11px;">수정</a>
                            <form th:action="@{/admin/product/{id}/toggle(id=${product.id})}"
                                  method="post" class="d-inline">
                                <button type="submit" class="btn btn-outline-secondary btn-sm"
                                        style="font-size: 11px;"
                                        th:text="${product.enabled ? '숨김' : '노출'}">숨김</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="8" class="text-center text-muted py-4">등록된 상품이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a href="/admin/dashboard" class="btn btn-outline-dark btn-sm">대시보드로</a>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
