<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - 상품 상세 | FASHION STORE'">상품 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <!-- 브레드크럼 -->
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb" style="font-size: 12px;">
            <li class="breadcrumb-item"><a href="/admin/dashboard" class="text-dark">관리자</a></li>
            <li class="breadcrumb-item"><a href="/admin/product" class="text-dark">상품관리</a></li>
            <li class="breadcrumb-item active" th:text="${product.name}">상품명</li>
        </ol>
    </nav>

    <div class="row g-4">
        <!-- 상품 이미지 -->
        <div class="col-md-6">
            <div class="product-img-placeholder" style="background-color: #f5f5f5; aspect-ratio: 3/4; border-radius: 8px;">
                <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" th:alt="${product.name}"
                     style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">
                <span th:if="${product.imageUrl == null}" style="font-size: 16px; color: #bbb;">NO IMAGE</span>
            </div>
        </div>

        <!-- 상품 정보 -->
        <div class="col-md-6">
            <div class="d-flex align-items-center gap-2 mb-2">
                <span class="badge bg-dark" th:text="${product.category.displayName}">카테고리</span>
                <span th:if="${product.sale}" class="badge bg-danger">SALE</span>
                <span th:if="${product.new}" class="badge bg-secondary">NEW</span>
                <span th:if="${product.enabled}" class="badge bg-success">판매중</span>
                <span th:unless="${product.enabled}" class="badge bg-secondary">숨김</span>
            </div>

            <h4 class="fw-bold mt-1" th:text="${product.name}">상품명</h4>

            <!-- 가격 -->
            <div class="mt-3">
                <div th:if="${product.sale && product.originalPrice != null}" class="mb-1">
                    <span class="product-original-price" style="font-size: 16px;"
                          th:text="${#numbers.formatInteger(product.originalPrice, 0, 'COMMA')} + '원'">0원</span>
                    <span class="product-discount" style="font-size: 18px;"
                          th:text="${product.discountPercent} + '%'">0%</span>
                </div>
                <p class="fw-bold mb-0" style="font-size: 24px;"
                   th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'">0원</p>
            </div>

            <!-- 상품 설명 -->
            <p class="mt-3 text-muted" style="font-size: 13px; line-height: 1.8;"
               th:text="${product.description}">상품 설명</p>

            <!-- 상세 정보 -->
            <hr>
            <table class="table table-sm" style="font-size: 13px;">
                <tr>
                    <td class="text-muted" style="width: 100px;">상품 ID</td>
                    <td th:text="${product.id}">1</td>
                </tr>
                <tr>
                    <td class="text-muted">재고</td>
                    <td>
                        <span th:class="${product.stock <= 5 ? 'text-danger fw-bold' : ''}"
                              th:text="${product.stock > 0 ? product.stock + '개' : '품절'}">0개</span>
                    </td>
                </tr>
                <tr>
                    <td class="text-muted">조회수</td>
                    <td th:text="${product.viewCount}">0</td>
                </tr>
                <tr>
                    <td class="text-muted">좋아요</td>
                    <td th:text="${product.wishCount}">0</td>
                </tr>
                <tr>
                    <td class="text-muted">등록일</td>
                    <td th:text="${#temporals.format(product.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                </tr>
            </table>

            <hr>

            <!-- 관리 버튼 -->
            <div class="d-flex gap-2 mt-3">
                <a th:href="@{/admin/product/{id}/edit(id=${product.id})}"
                   class="btn btn-dark btn-sm px-4">
                    <i class="bi bi-pencil"></i> 수정
                </a>
                <form th:action="@{/admin/product/{id}/toggle(id=${product.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-dark btn-sm px-4"
                            th:text="${product.enabled ? '숨김 처리' : '노출 처리'}">숨김 처리</button>
                </form>
                <a href="/admin/product" class="btn btn-outline-secondary btn-sm px-4">목록으로</a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
