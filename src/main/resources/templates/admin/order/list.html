<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문관리 - FASHION STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <h5 class="fw-bold mb-4">주문관리</h5>

    <div th:if="${message}" class="alert alert-success" style="font-size: 13px;" th:text="${message}"></div>

    <!-- 상태 필터 -->
    <div class="mb-3 d-flex flex-wrap gap-2">
        <a href="/admin/order" class="btn btn-sm"
           th:classappend="${currentStatus == null ? 'btn-dark' : 'btn-outline-dark'}">전체</a>
        <a th:each="s : ${statuses}" th:href="@{/admin/order(status=${s.name()})}"
           class="btn btn-sm"
           th:classappend="${currentStatus == s.name() ? 'btn-dark' : 'btn-outline-dark'}"
           th:text="${s.displayName}">상태</a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0" style="font-size: 13px;">
                <thead class="table-light">
                    <tr>
                        <th style="width: 140px;">주문번호</th>
                        <th>주문자</th>
                        <th>상품</th>
                        <th style="width: 100px;">결제금액</th>
                        <th style="width: 80px;">상태</th>
                        <th style="width: 130px;">주문일시</th>
                        <th style="width: 70px;">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td style="font-size: 12px;" th:text="${order.orderNumber}">ORD000</td>
                        <td th:text="${order.member.nickname}">회원</td>
                        <td>
                            <span th:if="${!order.orderItems.isEmpty()}"
                                  th:text="${order.orderItems[0].productName +
                                  (order.orderItems.size() > 1 ? ' 외 ' + (order.orderItems.size() - 1) + '건' : '')}">
                                상품명
                            </span>
                        </td>
                        <td class="fw-bold"
                            th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA')} + '원'">0원</td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${order.status.name() == 'CANCELLED' ? 'bg-secondary' :
                                                   (order.status.name() == 'DELIVERED' ? 'bg-success' :
                                                   (order.status.name() == 'SHIPPING' ? 'bg-primary' : 'bg-dark'))}"
                                  th:text="${order.status.displayName}">상태</span>
                        </td>
                        <td style="font-size: 12px;"
                            th:text="${#temporals.format(order.createdAt, 'yyyy.MM.dd HH:mm')}">날짜</td>
                        <td>
                            <a th:href="@{/admin/order/{id}(id=${order.id})}"
                               class="btn btn-outline-dark btn-sm" style="font-size: 11px;">상세</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="7" class="text-center text-muted py-4">주문이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a href="/admin/dashboard" class="btn btn-outline-dark btn-sm">대시보드로</a>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
