    <path d="M20,22 L20,35" stroke-width="1.5" opacity="0.3"/>
    <path d="M40,20 L40,35" stroke-width="1.5" opacity="0.3"/>
    <path d="M60,18 L60,35" stroke-width="1.5" opacity="0.3"/>
